<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../css/style.css" rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300&display=swap" rel="stylesheet">
    <title>Consultaion</title>

  </head>
  <body>
    <div>
      <a href="../index.html"
        ><img
          src="../Into art logo//into art logo.jpg"
          width="300"
          length="300"
      /></a>
    </div>

    <br />

    <form id="consultations">
      <h3>B O O K &nbsp; Y O U R &nbsp; F R E E &nbsp;<br>C O N S U L T A T I O N</h3>

      <br />

      <section class="customer-info">
        <label for="customer-email"><strong>Email:</strong></label
        ><br /><br />
        <input
          type="text"
          name="customer-email"
          id="customer-email"
          required
        /><br /><br />

        <label for="customer-name"><strong>Full name:</strong></label
        ><br /><br />
        <input type="text" name="customer-name" id="customer-name" required />

        <br /><br />

        <label for="customer-phone-number"><strong>Phone number:</strong></label
        ><br /><br />
        <input
          type="text"
          name="customer-phone-number"
          id="customer-phone-number"
          required
        />
      </section>

      <br /><br />

      <section class="building-condition">
        <label for="building-condition"
          ><strong>Building condition: </strong></label
        ><br /><br />

        <select
          name="building-condition"
          id="building-condition"
          style="height: 23px; width: 175px"
        >
          <option value="new-building" id="new-building">New building</option>
          <option value="restoration" id="restoration">
            Restoration
          </option></select
        ><br /><br />

        <label for="building-condition"><strong>Other:</strong></label>
        <input
          type="text"
          name="building-condition"
          id="other-design"
          style="height: 15px; width: 222px"
        />
      </section>

      <br /><br />

      <section class="design-style">
        <label for="design-style"><strong>Design style: </strong></label
        ><br /><br />

        <select
          name="design-style"
          id="design-style"
          style="height: 23px; width: 175px"
        >
          <option value="neo-classic-design" id="neo-classic-design">
            Neo classic
          </option>
          <option value="classic-design" id="classic-design">Classic</option>
          <option value="modern-design" id="modern-design">Modern</option>
          <option value="morocco-design" id="morocco-design">Morocco</option>
          <option
            value="modern-neo-classic-design"
            id="modern-neo-classic-design"
          >
            Modern neo classic
          </option>
          <option value="boheme-design" id="boheme-design">Boheme</option>
          <option value="industrial-design" id="industrial-design">
            Industrial
          </option>
          <option
            value="no-specific-style-design"
            id="no-specific-style-design"
          >
            No specific style
          </option></select
        ><br /><br />

        <label for="design-style"><strong>Other:</strong></label>
        <input
          type="text"
          name="design-style"
          id="other-design"
          style="height: 15px; width: 222px"
        />
      </section>

      <br /><br />

      <section class="storey">
        <label for="storey"><strong>Storey: </strong></label><br /><br />

        <select name="Storey" id="storey" style="height: 23px; width: 175px">
          <option value="Basement" id="basement">Basement</option>
          <option value="Ground floor" id="ground-floor">Ground floor</option>
          <option value="First floor" id="first-floor">First floor</option>
          <option value="Second floor" id="second-floor">Second floor</option>
          <option value="Roof" id="roof">Roof</option></select
        ><br /><br />

        <label for="storey"><strong>Other:</strong></label>
        <input
          type="text"
          name="Storey"
          id="other-design"
          style="height: 15px; width: 222px"
        />
      </section>

      <br /><br />

      <section class="design-place">
        <label for="design-place"><strong>Design place: </strong></label
        ><br /><br />

        <select
          name="design-place"
          id="design-place"
          style="height: 23px; width: 175px"
        >
          <option value="reception-hall" id="reception-hall">
            Reception hall
          </option>
          <option value="living-room" id="living-room">Living room</option>
          <option value="bath-room" id="bath-room">Bath room</option>
          <option value="laundry-room" id="laundry-room">Laundry room</option>
          <option value="corridor" id="corridor">Corridor</option>
          <option value="diwaniyah" id="diwaniyah">Diwaniyah</option>
          <option value="women's-Diwaniyah" id="women's-Diwaniyah">
            Women's Diwaniyah
          </option>
          <option value="maglat" id="maglat">Maglat</option>
          <option value="outdoor-Seating" id="outdoor-Seating">
            Outdoor Seating
          </option>
          <option value="fallen-yard" id="fallen-yard">Fallen yard</option>
          <option value="yard" id="yard">Yard</option>
          <option value="indoor-garden" id="indoor-garden">
            Indoor garden
          </option>
          <option value="outdoor-garden" id="outdoor-garden">
            Outdoor garden
          </option>
          <option value="swimming-pool" id="swimming-pool">
            Swimming pool
          </option>
          <option value="bedroom" id="bedroom">Bedroom</option>
          <option value="master-bedroom" id="master-bedroom">
            Master bedroom
          </option>
          <option value="dressing-Room" id="dressing-Room">
            Dressing Room
          </option>
          <option value="roof" id="roof">Roof</option>
          <option value="dining-room" id="dining-room">Dining room</option>
          <option value="business" id="business">Business</option></select
        ><br /><br />

        <label for="design-place"><strong>Other:</strong></label>
        <input
          type="text"
          name="design-place"
          id="other-design"
          style="height: 15px; width: 222px"
        />
      </section>

      <br /><br />

      <section class="date-of-consultation">
        <label
          ><strong for="date-of-consultation"
            >Free consultation date:</strong
          ></label
        >
        <h5 id="working-times">Working hours are from Saturday to Thursday</h5>
        <input type="date" required style="height: 23px; width: 160px" />
      </section>

      <br /><br />

      <section class="submission">
        <input type="submit" value="Send" style="height: 35px; width: 100px" />
      </section>
    </form>
    <br /><br />

    <footer id="contact">
      <p>
        <strong id="company's-email">Email:</strong> info@intoakwt.com |
        <strong id="company's-phone-number">Phone:</strong> +965 6665 76673 |
        <strong id="company's-address">Address:</strong>
        Ibn khaldoun st, Hawalli, Al Asimah, Kuwait |
        <a href="https://goo.gl/maps/gFEryfBrdrtyWtge9" target="_blank"
          ><strong id="location">Google Maps</strong></a
        >
      </p>
    </footer>
  </body>
</html>
